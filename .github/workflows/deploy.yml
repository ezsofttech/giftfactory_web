name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: giftfactory-web
  ECS_CLUSTER: giftfactory-cluster

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (${{ github.ref == 'refs/heads/main' && 'production' || 'development' }})
    runs-on: ubuntu-latest

    env:
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
      IMAGE_TAG: ${{ github.ref == 'refs/heads/main' && 'prod-latest' || 'dev-latest' }}
      API_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.ezzme.com/api/v1' || 'https://dev-api.ezzme.com/api/v1' }}
      SITE_URL: ${{ github.ref == 'refs/heads/main' && 'https://giftfactory.ezzme.com' || 'https://dev-giftfactory.ezzme.com' }}
      APP_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
      ECS_SERVICE: ${{ github.ref == 'refs/heads/main' && 'giftfactory-web-production' || 'giftfactory-web-development' }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push (${{ env.IMAGE_TAG }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.API_BASE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.SITE_URL }}
            NEXT_PUBLIC_APP_URL=${{ env.SITE_URL }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            APP_ENV=${{ env.APP_ENV }}

      - name: Deploy ECS with rollback on failure
        run: |
          set -euo pipefail
          SVC="${ECS_SERVICE}"

          PREV_TD=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${SVC}" \
            --region "${AWS_REGION}" \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "Saved ${SVC} task definition: ${PREV_TD}"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${SVC}" \
            --force-new-deployment \
            --region "${AWS_REGION}" \
            --no-cli-pager

          if aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${SVC}" \
            --region "${AWS_REGION}"; then
            echo "ECS deployment stable (${DEPLOY_ENV})."
          else
            echo "ECS deployment failed — rolling back ${SVC}..."
            aws ecs update-service \
              --cluster "${ECS_CLUSTER}" \
              --service "${SVC}" \
              --task-definition "${PREV_TD}" \
              --force-new-deployment \
              --region "${AWS_REGION}" \
              --no-cli-pager

            aws ecs wait services-stable \
              --cluster "${ECS_CLUSTER}" \
              --services "${SVC}" \
              --region "${AWS_REGION}" || true

            echo "Rollback complete. Failing workflow because deploy did not stabilize."
            exit 1
          fi

      - name: Verify health endpoint
        run: |
          curl -fsS "${SITE_URL}/api/health/live"
          curl -fsS "${SITE_URL}/api/health/ready"
